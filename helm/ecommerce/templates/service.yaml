{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
{{- if and $.Values.rollouts.enabled (eq $.Values.rollouts.strategy "canary") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}-canary
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
{{- end }}
{{- if and $.Values.rollouts.enabled (eq $.Values.rollouts.strategy "blueGreen") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}-preview
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}

