{{- if .Values.rollouts.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
  strategy:
    {{- if eq $.Values.rollouts.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
      previewService: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}-preview
      autoPromotionEnabled: {{ $.Values.rollouts.blueGreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ $.Values.rollouts.blueGreen.scaleDownDelaySeconds }}
    {{- else }}
    canary:
      stableService: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
      canaryService: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}-canary
      maxSurge: {{ $.Values.rollouts.canary.maxSurge | quote }}
      maxUnavailable: {{ $.Values.rollouts.canary.maxUnavailable }}
      {{- if $.Values.istio.enabled }}
      trafficRouting:
        istio:
          virtualService:
            name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
            routes:
              - primary
      {{- end }}
      steps:
        {{- toYaml $.Values.rollouts.canary.steps | nindent 8 }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ecommerce.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name }}
          image: "{{ default (printf "%s/%s" (required "global.imageRegistry is required" $.Values.global.imageRegistry) $name) $svc.image.repository }}:{{ required "global.imageTag is required" (default $.Values.global.imageTag $svc.image.tag) }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: {{ $name | quote }}
            - name: PLATFORM_REGION
              value: {{ $.Values.global.region | quote }}
            - name: SERVICE_VERSION
              value: {{ default $.Values.global.imageTag $svc.image.tag | quote }}
            {{- if $.Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: {{ $name | quote }}
            {{- else }}
            - name: OTEL_SDK_DISABLED
              value: "true"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
{{- end }}
{{- end }}
