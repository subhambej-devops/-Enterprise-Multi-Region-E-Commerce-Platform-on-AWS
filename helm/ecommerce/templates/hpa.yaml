{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: {{ ternary "argoproj.io/v1alpha1" "apps/v1" $.Values.rollouts.enabled }}
    kind: {{ ternary "Rollout" "Deployment" $.Values.rollouts.enabled }}
    name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
  minReplicas: {{ $svc.autoscaling.minReplicas }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}

