{{- if .Values.istio.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
spec:
  hosts:
    - {{ required "global.domain is required" $.Values.global.domain | quote }}
  gateways:
    - {{ printf "%s/%s" $.Release.Namespace $.Values.istio.gatewayName | quote }}
  http:
    - name: primary
      match:
        - uri:
            prefix: {{ $svc.pathPrefix | quote }}
      route:
        {{- if and $.Values.rollouts.enabled (eq $.Values.rollouts.strategy "canary") }}
        - destination:
            host: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
            port:
              number: 80
          weight: 100
        - destination:
            host: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}-canary
            port:
              number: 80
          weight: 0
        {{- else }}
        - destination:
            host: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
            port:
              number: 80
          weight: 100
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
