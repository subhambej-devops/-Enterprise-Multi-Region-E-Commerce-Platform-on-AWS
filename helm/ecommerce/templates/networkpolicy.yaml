{{- if .Values.networkPolicy.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ecommerce.serviceName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "ecommerce.commonLabels" $ | nindent 4 }}
    {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ecommerce.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
{{- end }}
{{- end }}
{{- end }}
