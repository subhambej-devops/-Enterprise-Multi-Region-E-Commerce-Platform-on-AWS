name: Build and Promote

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region that hosts the source ECR repositories
        required: true
        default: us-east-1
      image_tag:
        description: Image tag to publish and promote
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "ecommerce_platform/**"
      - "services/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy-gitops.yml"

permissions:
  contents: write
  id-token: write

env:
  PROJECT_NAME: enterprise-commerce

jobs:
  build-push-promote:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, checkout]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region || 'us-east-1' }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Compute image tag
        id: image
        shell: bash
        run: |
          tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="sha-${GITHUB_SHA}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          image="${{ steps.ecr.outputs.registry }}/${PROJECT_NAME}/${{ matrix.service }}:${{ steps.image.outputs.tag }}"
          docker build --build-arg SERVICE=${{ matrix.service }} -t "$image" .
          docker push "$image"

  promote:
    needs: build-push-promote
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve promoted tag
        id: image
        shell: bash
        run: |
          tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="sha-${GITHUB_SHA}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Promote image tag in Helm values
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.global.imageTag = "${{ steps.image.outputs.tag }}"' helm/ecommerce/values.yaml
      - name: Commit GitOps promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/ecommerce/values.yaml
          git commit -m "Promote images ${{ steps.image.outputs.tag }}" || exit 0
          git push
