apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            platform.openai.com/workload: enterprise-commerce
  template:
    metadata:
      name: 'platform-tempo-{{ .name }}'
    spec:
      project: default
      sources:
        - repoURL: https://grafana.github.io/helm-charts
          chart: tempo-distributed
          targetRevision: 1.61.1
          helm:
            valueFiles:
              - $values/kubernetes/observability/tempo-values.yaml
        - repoURL: https://github.com/your-org/enterprise-commerce.git
          targetRevision: main
          ref: values
      destination:
        server: '{{ .server }}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
