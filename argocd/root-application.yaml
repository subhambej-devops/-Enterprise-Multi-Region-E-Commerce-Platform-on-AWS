apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-commerce-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/enterprise-commerce.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true
      exclude: root-application.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

