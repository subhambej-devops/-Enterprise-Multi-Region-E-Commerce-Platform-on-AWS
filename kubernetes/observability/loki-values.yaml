loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: enterprise-commerce-loki-chunks
      ruler: enterprise-commerce-loki-ruler
      admin: enterprise-commerce-loki-admin
    s3:
      region: us-east-1
  limits_config:
    allow_structured_metadata: true

gateway:
  enabled: true

write:
  replicas: 3

read:
  replicas: 3

backend:
  replicas: 3
