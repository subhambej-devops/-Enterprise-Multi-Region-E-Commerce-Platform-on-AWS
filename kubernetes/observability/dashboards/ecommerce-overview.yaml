apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-overview-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: enterprise-commerce
data:
  ecommerce-overview.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum by (service, region) (rate(ecommerce_http_requests_total[5m]))",
              "legendFormat": "{{service}} {{region}}"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "max by (service, region) (ecommerce_service_uptime_seconds)",
              "legendFormat": "{{service}} {{region}}"
            }
          ],
          "title": "Service Uptime",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "enterprise-commerce"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Enterprise Commerce Overview",
      "uid": "enterprise-commerce-overview",
      "version": 1
    }
